mcp_port: 15702
ros_namespace: ""   # 留空则自动使用 hostname
name: "DJI Mavic 3E"

# PSDK bridge settings
psdk_bridge:
  app_name: "PhanthyMotus"
  app_id: "190076"
  app_key: "26af38fb6126f58c195b5c8da0b481c"
  app_license: ""
  baud_rate: 921600
  uart_dev: "auto"           # "auto" = scan /dev/ttyUSB* and /dev/ttyACM* for E-Port device
  usb_vid: ""                # Leave empty for auto-detect (supports FTDI 0403 and DJI 2ca3)
  network_iface: "usb0"  # E-Port USB-Ethernet interface

plugins:
  telemetry:
    enabled: true
    publish_rate: 10   # Hz
  camera_stream:
    enabled: true
    fps: 10
    camera_source: "wide"   # wide / zoom / ir (3T only)
  perception:
    enabled: true
  hms:
    enabled: true
  flight:
    enabled: true
  camera:
    enabled: true
  gimbal:
    enabled: true
  waypoint:
    enabled: true
  time_sync:
    enabled: true
