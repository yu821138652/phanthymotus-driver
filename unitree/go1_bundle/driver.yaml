id: go1-bundle-driver
name: Unitree Go1 Bundle (state + control)
category: driver
hardware_provider: unitree
hardware_model: "go1"
image_name: go1_bundle
port: 15717
mcp_url: "http://localhost:15717/mcp"
description: "Unitree Go1 (EDU) 状态+控制驱动（原始 unitree_legged_sdk）。传感卡：运动状态(loco_state) + 电池(battery) + IMU(imu) + 足端(feet) + 跌倒告警(fall_alarm) + 里程计(odometry) + 超声波避障(obstacle_range) + UDP 通信诊断(udp_diagnostics) + 腿关节(joints) + 无线遥控器(remote_controller) + 双目深度推流(test_camera_depth，可选机位·multiInstance；test 前缀=未验收，验收后改名 camera_depth) + 五机位 RGB 相机(camera_rgb，front/chin/left/right/belly 可切换/多实例并看，undistort_mono 去畸变)；控制卡：基础运动(loco，三维速度+站立/姿态/身高) + 机身姿态/高度(body_pose，roll/pitch/yaw+机身高度偏移+抬脚高度偏移+复位) + 表演/表情(gesture，作揖/点头/跳舞等，异步) + 步态切换(switch_gait) + 头部扬声器(beep) + 头部扬声器远程麦克风播放(speaker，订阅 /remote_control/mic 播放) + 面部灯带(face_light) + 面部灯带动效(test_light_effect，solid/blink/breathe/fade/渐亮渐暗+语义预设，各带duration；test前缀=未验收，验收后改名 light_effect) + 机器人整体状态/健康信息(system_health，action=robot_info,一次看主控板+子系统状态) + 电源(test_power_control，关机 power_off=sudo poweroff 关主控 Pi 整机下电，不可逆，需 confirm+reason+静止前置；test 前缀=未验收，验收后改回 power_control)；资源卡：go1 URDF(model，供 joints 骨架渲染)。beep/speaker/camera 的 Nano 后端由容器首启时的 deploy/nano_bootstrap.sh 自动部署。可作为新增卡片的开发蓝本，见 CONTRIBUTING.md。"
