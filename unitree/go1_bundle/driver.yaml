id: go1-bundle-driver
name: Unitree Go1 Bundle (state + control)
category: driver
hardware_provider: unitree
hardware_model: "go1"
image_name: go1_bundle
port: 15717
mcp_url: "http://localhost:15717/mcp"
description: "Unitree Go1 (EDU) 状态+控制驱动（原始 unitree_legged_sdk）。传感卡：运动状态(loco_state) + 电池(battery) + IMU(imu) + 足端(feet) + 跌倒告警(fall_alarm) + 网络(net) + 里程计(odometry) + 超声波避障(obstacle_range) + UDP 通信诊断(udp_diagnostics) + 腿关节(joints) + 无线遥控器(remote_controller) + 双目深度推流(camera_depth) + 前置 RGB 相机(camera_rgb)；控制卡：基础运动(loco，三维速度+站立/姿态/身高) + 机身姿态/高度(body_pose，roll/pitch/yaw+机身高度偏移+抬脚高度偏移+复位) + 原地转圈(spin，闭环读 IMU yaw 自停) + 表演/表情(gesture，作揖/点头/跳舞等，异步) + 步态切换(switch_gait) + 头部扬声器(beep) + 面部灯带(face_light) + 诊断执行(system_health) + 电源(test_power_control，关机 power_off，不可逆，需 confirm+reason+静止前置；test 前缀=未验收，验收后改回 power_control)；资源卡：go1 URDF(model，供 joints 骨架渲染)。beep/camera 的 Nano 后端由容器首启时的 deploy/nano_bootstrap.sh 自动部署。可作为新增卡片的开发蓝本，见 CONTRIBUTING.md。"
