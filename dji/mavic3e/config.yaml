mcp_port: 15702
ros_namespace: ""   # 留空则自动使用 hostname
name: "DJI Mavic 3E"

# PSDK bridge settings
psdk_bridge:
  app_name: "PhanthyMotus"
  app_id: "190076"
  app_key: "26af38fb6126f58c195b5c8da0b481c"
  app_license: ""
  baud_rate: 921600
  uart_dev: "/dev/ttyACM0"
  usb_vid: "2ca3"        # DJI USB Vendor ID
  usb_pid: "001f"        # Mavic 3E E-Port Product ID
  network_iface: "usb0"  # E-Port USB-Ethernet interface
  mock_mode: true        # true = simulated responses (no hardware needed)
                         # Set env PSDK_MOCK=0 to override and connect to real psdk_bridge

plugins:
  telemetry:
    enabled: true
    publish_rate: 10   # Hz
  camera_stream:
    enabled: true
    fps: 10
    camera_source: "wide"   # wide / zoom / ir (3T only)
  perception:
    enabled: true
  hms:
    enabled: true
  flight:
    enabled: true
  camera:
    enabled: true
  gimbal:
    enabled: true
  waypoint:
    enabled: true
  speaker:
    enabled: true
  power:
    enabled: true
