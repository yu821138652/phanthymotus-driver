id: go1-bundle-driver
name: Unitree Go1 Bundle (read-only state)
category: driver
hardware_provider: unitree
hardware_model: "go1"
image_name: go1_bundle
port: 15717
mcp_url: "http://localhost:15717/mcp"
description: "Unitree Go1 (EDU) 状态+基础控制驱动（原始 unitree_legged_sdk）— 状态卡：运动状态(loco_state) + 电池(battery) + 超声波避障(obstacle_range) + IMU(imu) + 足端(feet) + 跌倒告警(fall_alarm) + 网络(net) + 里程计(odometry) + UDP 通信诊断(udp_diagnostics)；控制卡：原地转圈(spin，闭环读 IMU yaw 自停) + 基础运动(loco，三维速度+站立/姿态/身高) + 表演/表情(gesture，作揖/点头/跳舞等，异步) + 电源(power_control，关机 power_off，不可逆，需 confirm+reason+静止前置)。可作为新增卡片的开发蓝本，见 CONTRIBUTING.md。"
