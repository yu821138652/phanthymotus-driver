mcp_port: 15703
ros_namespace: ""   # 留空则自动使用 hostname
name: "DJI Mavic 4E/4T"

# PSDK bridge settings
psdk_bridge:
  app_name: "PhanthyMotus"
  app_id: "190076"
  app_key: "26af38fb6126f58c195b5c8da0b481c"
  app_license: ""
  baud_rate: 921600
  uart_dev: "auto"
  usb_vid: ""
  network_iface: "usb0"

plugins:
  telemetry:
    enabled: true
    publish_rate: 10
  camera_stream:
    enabled: true
    fps: 10
    camera_source: "wide"   # wide / zoom / ir (4T only) / 4k
  perception:
    enabled: true
  hms:
    enabled: true
  flight:
    enabled: true
  camera:
    enabled: true
  gimbal:
    enabled: true
  waypoint:
    enabled: true
  time_sync:
    enabled: true
